<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Document</title>
  </head>
  <body>
    <header>
      <div class="menu">
        <div class="logo">
          <img src="https://placehold.co/40" alt="" />
          <h2>Ehrlich IT Services</h2>

          <nav>
            <ul class="menu-list">
              <li><a href="#">Home</a></li>
              <li><a href="#">Foo</a></li>
              <li><a href="#">Bar</a></li>
            </ul>
          </nav>
        </div>
        <div class="account">
          <p class="name">Hi, Bastian!</p>
          <img src="https://placehold.co/40" alt="" />
        </div>
      </div>
    </header>
    <main>
      <div class="container">
        <div class="wrapper"><h1>Hello World!</h1></div>
      </div>

      <form id="form">
        <div>
          <label for="firstname"></label>
          <input
            type="text"
            name="firstname"
            id="firstname"
            placeholder="First Name"
            required
          />
        </div>
        <div>
          <label for="lastname"></label>
          <input
            type="text"
            name="lastname"
            id="lastname"
            placeholder="Last Name"
            required
          />
        </div>
        <div>
          <label for="lastname"></label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Email Address"
            required
          />
        </div>
        <div>
          <label for="password"></label>
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Password"
            required
          />
        </div>
        <div>
          <label for="password"></label>
          <input
            type="password"
            name="confirmpassword"
            id="confirmPassword"
            placeholder="Confirm Password"
          />
        </div>
        <button type="submit">
            Register
        </button>
        <button type="submit" onclick="resetForm()">
            Cancel
        </button>
      </form>
      <p id="error-message"> </p>

      <section>
        <div class="icon">
          <img src="https://placehold.co/40" alt="" />
          <span class="notif">1</span>
        </div>
      </section>
    </main>


  </body>
</html>
